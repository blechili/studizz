# Studiz — Apache vhost for the Railway container.
# __PORT__ is replaced at container startup (see docker/entrypoint.sh) with
# Railway's dynamic $PORT — Railway does not terminate TLS on our container,
# it proxies plain HTTP from its own HTTPS edge, so there is no ssl_* config
# here (unlike deploy/nginx/studiz.conf, which is written for a real VPS
# doing its own TLS termination via certbot).
<VirtualHost *:__PORT__>
    # DocumentRoot is the repo root (not public/) because backend/gateways/*.php
    # must also be directly requestable — same layout as deploy/nginx/studiz.conf.
    DocumentRoot /var/www/html
    DirectoryIndex public/index.php

    <Directory /var/www/html>
        Options -Indexes -FollowSymLinks
        AllowOverride None
        Require all granted
    </Directory>

    # ── Block direct access to anything that must never be web-served ──
    # Mirrors the deny rules in deploy/nginx/studiz.conf.
    <FilesMatch "\.(env|sql|log|md|py|pyc|gitkeep|lock)$">
        Require all denied
    </FilesMatch>

    <DirectoryMatch "^/var/www/html/(database|deploy|python|docker|backend/config|backend/logs)(/|$)">
        Require all denied
    </DirectoryMatch>

    # Uploads are processed and deleted immediately (see @unlink calls in
    # api_gateway.php) — never served to the browser.
    <DirectoryMatch "^/var/www/html/uploads(/|$)">
        Require all denied
    </DirectoryMatch>

    # ── Security headers (mirrors deploy/nginx/studiz.conf) ─────────────
    Header always set X-Frame-Options "DENY"
    Header always set X-Content-Type-Options "nosniff"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"
    Header always set Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=()"
    # Railway's edge already terminates TLS for every request that reaches
    # this container, so it is always safe to assert HSTS here.
    Header always set Strict-Transport-Security "max-age=3600; includeSubDomains"
    Header always set Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' https://i.ytimg.com data:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self';"

    ErrorLog /dev/stderr
    CustomLog /dev/stdout combined
</VirtualHost>

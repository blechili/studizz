; /etc/php/8.2/fpm/pool.d/studiz.conf
; Dedicated PHP-FPM pool for Studiz.
; Adjust [studiz], user, and group to match your VPS setup.
; Apply: systemctl reload php8.2-fpm

[studiz]
user  = www-data
group = www-data

; Socket path must match fastcgi_pass in the Nginx server block
listen = /run/php/php8.2-fpm.sock
listen.owner = www-data
listen.group = www-data
listen.mode  = 0660

; ── Process management ───────────────────────────────────────────────────────
pm                   = dynamic
pm.max_children      = 10
pm.start_servers     = 2
pm.min_spare_servers = 1
pm.max_spare_servers = 3
; Recycle workers occasionally to free accumulated memory
pm.max_requests      = 500

; ── Environment variables ─────────────────────────────────────────────────────
; These replace the hardcoded values in backend/config/constants.php and
; backend/config/db.php. Set the real values here — this file should NOT
; be committed to version control (it contains live credentials).
;
; After editing this file: systemctl reload php8.2-fpm
; Verify they loaded: php-fpm8.2 -t

env[OPENAI_API_KEY]   = "sk-proj-your-real-key-here"
env[YOUTUBE_API_KEY]  = "AIzaSy-your-real-key-here"

env[STUDIZ_DB_HOST]   = "127.0.0.1"
env[STUDIZ_DB_PORT]   = "3306"
env[STUDIZ_DB_NAME]   = "studiz_db"
env[STUDIZ_DB_USER]   = "studiz_user"
env[STUDIZ_DB_PASS]   = "strong-random-password-here"

env[STUDIZ_ENV]       = "prod"
env[STUDIZ_ORIGIN]    = "https://yourdomain.com"

; ── PHP settings (override php.ini for this pool only) ───────────────────────
; Production error handling: log everything, display nothing
php_admin_value[error_log]            = /var/log/php/studiz-errors.log
php_admin_flag[log_errors]            = on
php_admin_flag[display_errors]        = off
php_admin_flag[display_startup_errors]= off
php_admin_value[error_reporting]      = E_ALL

; Execution limits — must be >= AI_TIMEOUT_SEC (300) in constants.php
php_admin_value[max_execution_time]   = 310
php_admin_value[max_input_time]       = 310

; Upload limits — must match UPLOAD_MAX_BYTES (20 MB) in constants.php
php_admin_value[upload_max_filesize]  = 20M
php_admin_value[post_max_size]        = 21M

; Session security
php_admin_value[session.cookie_httponly] = 1
php_admin_value[session.cookie_secure]   = 1
php_admin_value[session.cookie_samesite] = Strict
php_admin_value[session.use_strict_mode] = 1

; Disable dangerous PHP functions not used by Studiz.
; proc_open() is intentionally left enabled — api_gateway.php uses it
; to launch the Python text-extraction subprocess via an argv array
; (not a shell string), which is safe and documented in CLAUDE.md.
; Never use shell_exec/exec/system with user-controlled input instead.
php_admin_value[disable_functions] = exec,passthru,shell_exec,system,popen,curl_multi_exec,parse_ini_file,show_source

; Prevent path disclosure via PHP errors
php_admin_flag[expose_php] = off

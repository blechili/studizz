# /etc/nginx/sites-available/studiz
# Symlink to enable: ln -s /etc/nginx/sites-available/studiz /etc/nginx/sites-enabled/studiz
# Reload after changes: nginx -t && systemctl reload nginx

# ── HTTP → HTTPS redirect ────────────────────────────────────────────────────
server {
    listen      80;
    listen      [::]:80;
    server_name yourdomain.com www.yourdomain.com;

    # Certbot ACME challenge — keep HTTP open only for this path
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS main server ────────────────────────────────────────────────────────
server {
    listen      443 ssl;
    listen      [::]:443 ssl;
    http2       on;
    server_name yourdomain.com www.yourdomain.com;

    root  /var/www/studiz;
    index public/index.php;

    # ── TLS ─────────────────────────────────────────────────────
    ssl_certificate      /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key  /etc/letsencrypt/live/yourdomain.com/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/yourdomain.com/chain.pem;

    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;
    ssl_session_tickets       off;

    # OCSP stapling — tells the browser the cert is valid without a
    # separate OCSP round-trip during the TLS handshake
    ssl_stapling        on;
    ssl_stapling_verify on;
    resolver            1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout    5s;

    # ── Security headers ─────────────────────────────────────────
    # `always` means the header is sent even on error responses (4xx/5xx),
    # not just on 200 OK — critical for HSTS which must reach the browser
    # even when the page returns an error.

    # HSTS: tell browsers to never contact this domain over plain HTTP.
    # Start with 1h (3600), raise to 1y (31536000) once stable, then
    # add `preload` and submit to https://hstspreload.org
    add_header Strict-Transport-Security "max-age=3600; includeSubDomains" always;

    # Prevent framing this page in any iframe on any origin
    add_header X-Frame-Options "DENY" always;

    # Block MIME-type sniffing — e.g. serving a .txt file that is actually
    # JS and having the browser run it as a script
    add_header X-Content-Type-Options "nosniff" always;

    # When navigating away from Studiz, only send the origin (not the full
    # URL including path) in the Referer header, and nothing at all for
    # cross-origin navigations to HTTP sites
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Opt out of browser features this app does not use
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=()" always;

    # Content-Security-Policy
    # Breakdown of each directive:
    #   default-src 'self'              — baseline: only load from our own origin
    #   script-src  'self'              — no inline JS, no eval; only /public/js/app.js
    #   style-src   'self' 'unsafe-inline' https://fonts.googleapis.com
    #                                   — 'unsafe-inline' is required because the folder
    #                                     dot colours are set via JS innerHTML style attrs
    #                                     (dynamically generated per-user DB values —
    #                                     not expressible as a static CSS class)
    #   font-src    'self' https://fonts.gstatic.com
    #                                   — Google Fonts files are served from gstatic.com
    #   img-src     'self' https://i.ytimg.com data:
    #                                   — YouTube thumbnails come from i.ytimg.com;
    #                                     data: is for any base64-encoded inline images
    #   connect-src 'self'              — all fetch()/XHR goes to our own PHP gateways
    #   frame-ancestors 'none'          — stronger form of X-Frame-Options: DENY
    #   base-uri    'self'              — block <base href> injection attacks
    #   form-action 'self'              — no form can POST to a third-party URL
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' https://i.ytimg.com data:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;

    # ── Custom error pages ───────────────────────────────────────
    # Replaces the default Nginx error pages that expose server version,
    # software name, and port number. The `=200` rewrite makes the browser
    # see the correct status code while serving the HTML from our file.
    error_page 403 /public/errors/403.html;
    error_page 404 /public/errors/404.html;
    error_page 500 502 503 504 /public/errors/500.html;

    location = /public/errors/403.html { internal; }
    location = /public/errors/404.html { internal; }
    location = /public/errors/500.html { internal; }

    # ── Block access to files that must never be web-served ─────
    # Deny any request for .env, .sql, .log, .md, .py, .pyc files
    # and the backend config directory outright.
    # PHP files in /backend/ are still *executed* by the PHP location
    # block below — this only blocks direct download of non-PHP assets.
    location ~* \.(env|sql|log|md|py|pyc|gitkeep|lock)$ {
        deny all;
        return 404;   # 403 leaks that the file exists; 404 is safer
    }

    # Deny direct access to the database/ and deploy/ directories
    location ~* ^/(database|deploy|python|backend/config|backend/logs)/ {
        deny all;
        return 404;
    }

    # Deny the temporary uploads directory — files here should be
    # processed and deleted immediately, never served to the browser
    location ~* ^/uploads/ {
        deny all;
        return 404;
    }

    # ── Frontend (public/) ───────────────────────────────────────
    # The public directory holds index.php, CSS, JS, and images.
    # try_files first checks for an exact file match (e.g. /public/css/linear.css),
    # then a directory, then falls back to public/index.php for the SPA.
    location / {
        try_files $uri $uri/ /public/index.php?$query_string;
    }

    # ── PHP execution ────────────────────────────────────────────
    # All .php requests (both public/ and backend/) are passed to PHP-FPM.
    location ~ \.php$ {
        # Prevent Nginx from serving a PHP file as plain text if PHP-FPM is down
        try_files $uri =404;

        # Mitigate the "Nginx + PHP-FPM path info" vulnerability:
        # without fastcgi_split_path_info, a request for /app.js/index.php
        # would run /var/www/studiz/app.js as PHP if cgi.fix_pathinfo=1.
        fastcgi_split_path_info ^(.+?\.php)(/.*)$;

        fastcgi_pass   unix:/run/php/php8.2-fpm.sock;   # adjust for your PHP version
        fastcgi_index  index.php;
        include        fastcgi_params;
        fastcgi_param  SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param  PATH_INFO       $fastcgi_path_info;

        # AI pipeline can take up to 300s — set gateway timeouts accordingly
        fastcgi_read_timeout 310s;
        fastcgi_send_timeout 310s;
    }

    # ── Static asset caching ─────────────────────────────────────
    # Cache CSS, JS, and images aggressively. Fingerprint filenames
    # (e.g. app.v2.js) before setting to max; for now 1h is safe.
    location ~* \.(css|js|jpg|jpeg|png|gif|ico|woff2|woff|svg)$ {
        expires 1h;
        add_header Cache-Control "public, immutable";
        # Repeat security headers — add_header in a nested location block
        # does NOT inherit from the parent block in Nginx
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    }

    # ── Upload size limit ────────────────────────────────────────
    # Must match UPLOAD_MAX_BYTES in constants.php (20 MB) plus a small
    # overhead for multipart form boundaries and other fields
    client_max_body_size 21m;

    # ── Logging ──────────────────────────────────────────────────
    access_log /var/log/nginx/studiz.access.log;
    error_log  /var/log/nginx/studiz.error.log warn;
}

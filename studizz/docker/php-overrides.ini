; Studiz — production PHP overrides for the Railway container.
; Mirrors the [studiz] pool settings in deploy/php/studiz-pool.conf, adapted
; for mod_php (no php-fpm pool file in this container — see Dockerfile).

; Execution limits — must be >= AI_TIMEOUT_SEC (300) in constants.php
max_execution_time = 310
max_input_time = 310

; Upload limits — must match UPLOAD_MAX_BYTES (20 MB) in constants.php
upload_max_filesize = 20M
post_max_size = 21M

; Error handling: log everything, display nothing. STUDIZZ_ENV in
; constants.php independently gates JSON error bodies returned by the app
; itself — this is the belt-and-braces php.ini-level backstop.
display_errors = Off
display_startup_errors = Off
log_errors = On
error_log = /dev/stderr

; Session cookie security (Auth.php sets these explicitly per-cookie too,
; but session.* is set here for defence-in-depth / consistency)
session.cookie_httponly = 1
session.cookie_secure = 1
session.cookie_samesite = Strict
session.use_strict_mode = 1

; Disable dangerous functions not used by Studiz. proc_open() is
; intentionally left enabled — api_gateway.php uses it to launch the Python
; text-extraction subprocess via an argv array (not a shell string).
disable_functions = exec,passthru,shell_exec,system,popen,curl_multi_exec,parse_ini_file,show_source

expose_php = Off
